<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="roofGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="doorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Sky Background -->
  <rect width="800" height="600" fill="url(#skyGradient)" />
  
  <!-- Mountains in background -->
  <polygon points="0,400 200,300 400,350 600,280 800,320 800,600 0,600" fill="#e2e8f0" opacity="0.3" />
  
  <!-- Ground -->
  <rect x="0" y="500" width="800" height="100" fill="#10b981" opacity="0.2" />
  
  <!-- Main House -->
  <rect x="200" y="300" width="400" height="200" fill="url(#houseGradient)" stroke="#cbd5e1" stroke-width="2" opacity="0.9" />
  
  <!-- Roof -->
  <polygon points="150,300 400,180 650,300" fill="url(#roofGradient)" stroke="#64748b" stroke-width="2" opacity="0.9" />
  
  <!-- Chimney -->
  <rect x="500" y="200" width="30" height="80" fill="#94a3b8" opacity="0.8" />
  
  <!-- Door -->
  <rect x="350" y="400" width="100" height="100" fill="url(#doorGradient)" stroke="#6d28d9" stroke-width="2" opacity="0.9" />
  <circle cx="430" cy="450" r="4" fill="#fbbf24" opacity="0.8" />
  
  <!-- Windows -->
  <rect x="250" y="350" width="80" height="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" opacity="0.8" />
  <line x1="290" y1="350" x2="290" y2="430" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  <line x1="250" y1="390" x2="330" y2="390" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  
  <rect x="470" y="350" width="80" height="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" opacity="0.8" />
  <line x1="510" y1="350" x2="510" y2="430" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  <line x1="470" y1="390" x2="550" y2="390" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  
  <!-- Garage -->
  <rect x="100" y="350" width="120" height="150" fill="url(#houseGradient)" stroke="#cbd5e1" stroke-width="2" opacity="0.8" />
  <rect x="120" y="400" width="80" height="80" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" opacity="0.7" />
  
  <!-- Trees -->
  <circle cx="80" cy="420" r="40" fill="#10b981" opacity="0.4" />
  <rect x="75" y="440" width="10" height="60" fill="#92400e" opacity="0.6" />
  
  <circle cx="680" cy="400" r="50" fill="#10b981" opacity="0.4" />
  <rect x="675" y="430" width="10" height="70" fill="#92400e" opacity="0.6" />
  
  <!-- Decorative Elements -->
  <circle cx="120" cy="150" r="20" fill="#fbbf24" opacity="0.3" />
  <circle cx="650" cy="120" r="15" fill="#e5e7eb" opacity="0.4" />
  <circle cx="720" cy="180" r="12" fill="#e5e7eb" opacity="0.3" />
</svg>