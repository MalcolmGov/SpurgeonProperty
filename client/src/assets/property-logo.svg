<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern house icon -->
  <g transform="translate(10, 12)">
    <!-- House base -->
    <path d="M8 36 L28 36 L28 20 L18 10 L8 20 Z" fill="url(#gradient1)" stroke="#1e293b" stroke-width="1.5"/>
    <!-- Roof -->
    <path d="M4 20 L18 6 L32 20 L28 20 L18 10 L8 20 Z" fill="url(#gradient2)"/>
    <!-- Door -->
    <rect x="14" y="26" width="8" height="10" fill="#1e293b" rx="1"/>
    <!-- Windows -->
    <rect x="10" y="22" width="4" height="4" fill="#3b82f6" rx="0.5"/>
    <rect x="22" y="22" width="4" height="4" fill="#3b82f6" rx="0.5"/>
    <!-- Door handle -->
    <circle cx="20" cy="31" r="0.8" fill="#f59e0b"/>
  </g>
  
  <!-- Company name -->
  <text x="50" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">
    SpurgeonProperty
  </text>
  <text x="50" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b">
    Your Trusted Real Estate Partner
  </text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>