<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- High Contrast Logo for Header Visibility -->
  <defs>
    <linearGradient id="whiteBoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Shape for Contrast -->
  <rect x="5" y="10" width="70" height="60" rx="15" fill="rgba(255,255,255,0.15)" stroke="rgba(245,158,11,0.5)" stroke-width="2"/>
  
  <!-- Bold SP Icon -->
  <g transform="translate(15, 20)">
    <!-- S Shape - Bold and White -->
    <path d="M20 12 C28 12, 35 18, 35 26 C35 34, 28 40, 20 40 L12 40 C8 40, 5 43, 5 47 C5 51, 8 54, 12 54 L35 54" 
          stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- P Shape - Bold and White -->
    <path d="M42 12 L42 58 M42 12 L55 12 C62 12, 68 18, 68 25 C68 32, 62 38, 55 38 L42 38" 
          stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <!-- Gold Accent Elements -->
    <circle cx="58" cy="25" r="4" fill="url(#goldAccent)" filter="url(#glow)"/>
    <rect x="5" y="47" width="6" height="6" rx="3" fill="url(#goldAccent)" filter="url(#glow)"/>
  </g>
  
  <!-- Company Name - Large and Bold -->
  <text x="90" y="30" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" filter="url(#glow)">SPURGEON</text>
  <text x="90" y="55" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="url(#goldAccent)" filter="url(#glow)">Property</text>
  
  <!-- Enhanced Tagline -->
  <text x="90" y="70" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#E5E7EB">Your Trusted Real Estate Partner</text>
</svg>