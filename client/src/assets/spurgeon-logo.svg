<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern SP Icon with Gradient -->
  <defs>
    <linearGradient id="spGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EAB308;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="30" cy="30" r="25" fill="url(#spGradient)" opacity="0.1"/>
  
  <!-- Modern SP Icon -->
  <g transform="translate(10, 10)">
    <!-- S Shape -->
    <path d="M15 8 C20 8, 25 12, 25 18 C25 24, 20 28, 15 28 L10 28 C8 28, 6 30, 6 32 C6 34, 8 36, 10 36 L25 36" 
          stroke="url(#spGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- P Shape -->
    <path d="M30 8 L30 40 M30 8 L40 8 C44 8, 48 12, 48 16 C48 20, 44 24, 40 24 L30 24" 
          stroke="url(#spGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Orange Accent Elements -->
    <circle cx="42" cy="16" r="2" fill="url(#orangeAccent)"/>
    <rect x="6" y="32" width="4" height="4" rx="2" fill="url(#orangeAccent)"/>
  </g>
  
  <!-- Company Name -->
  <text x="65" y="20" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1F2937">SPURGEON</text>
  <text x="65" y="40" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="url(#spGradient)">Property</text>
  
  <!-- Tagline -->
  <text x="65" y="52" font-family="Inter, sans-serif" font-size="8" font-weight="400" fill="#6B7280" opacity="0.8">Your Trusted Real Estate Partner</text>
</svg>